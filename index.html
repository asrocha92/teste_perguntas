<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Lei 13.675/2018 - SUSP</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --light: #ecf0f1;
            --success: #27ae60;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .hidden { display: none; }
        
        /* Estilo dos Cards de Matéria */
        .grid-materias { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-materia { background: var(--primary); color: white; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .card-materia:hover { transform: translateY(-5px); background: var(--secondary); }

        /* Estilo das Questões */
        .questao-container { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        .tag-artigo { background: var(--accent); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; margin-bottom: 10px; display: inline-block; }
        .opcoes-lista { list-style: none; padding: 0; }
        .opcao-item { margin: 10px 0; padding: 10px; background: white; border: 1px solid #eee; border-radius: 4px; display: flex; align-items: center; }
        .btn-voltar { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .btn-voltar:hover { background: #7f8c8d; }
        
        .comentario { margin-top: 15px; padding: 10px; background: #dff9fb; border-left: 5px solid var(--accent); display: none; font-style: italic; }
        .btn-conferir { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- TELA INICIAL: Seleção de Matérias -->
    <div id="view-materias">
        <h1>Simulado de Segurança Pública</h1>
        <p style="text-align: center;">Selecione uma matéria para iniciar o treinamento:</p>
        <div id="lista-materias" class="grid-materias">
            <!-- Carregado via JSON -->
        </div>
    </div>

    <!-- TELA DE QUESTÕES -->
    <div id="view-questoes" class="hidden">
        <button class="btn-voltar" onclick="voltar()">← Voltar às Matérias</button>
        <h2 id="titulo-materia" style="color: var(--secondary);"></h2>
        <div id="lista-questoes">
            <!-- Carregado via JSON específico -->
        </div>
    </div>
</div>

<script>
    // 1. Carregar as matérias ao iniciar
    async function carregarMenu() {
        try {
            const response = await fetch('materias.json');
            const materias = await response.json();
            const container = document.getElementById('lista-materias');
            
            container.innerHTML = materias.map(m => `
                <div class="card-materia" onclick="abrirMateria('${m.id}', '${m.materia}')">
                    <h3>${m.materia}</h3>
                </div>
            `).join('');
        } catch (e) {
            console.error("Erro ao carregar matérias:", e);
        }
    }

    // 2. Abrir matéria e carregar arquivo de questões correspondente
    async function abrirMateria(id, nome) {
        document.getElementById('view-materias').classList.add('hidden');
        const viewQuestoes = document.getElementById('view-questoes');
        viewQuestoes.classList.remove('hidden');
        document.getElementById('titulo-materia').innerText = nome;

        try {
            // Tenta carregar o arquivo específico, ex: questoes_susp.json
            const response = await fetch(`questoes_${id}.json`);
            const questoes = await response.json();
            renderizarQuestoes(questoes);
        } catch (e) {
            document.getElementById('lista-questoes').innerHTML = `<p>Erro ao carregar o arquivo: questoes_${id}.json</p>`;
        }
    }

    // 3. Renderizar as questões (Tratando os tipos: múltipla escolha, V/F e Relacionar)
    function renderizarQuestoes(questoes) {
        const container = document.getElementById('lista-questoes');
        container.innerHTML = questoes.map(q => {
            let htmlOpcoes = "";

            if (q.tipo === "multipla_escolha" || q.tipo === "verdadeiro_falso") {
                htmlOpcoes = q.opcoes.map((opt, i) => `
                    <label class="opcao-item">
                        <input type="radio" name="q${q.id}" value="${i}"> ${opt}
                    </label>
                `).join('');
            } else if (q.tipo === "relacionar") {
                // Formata as colunas para o tipo Relacionar
                htmlOpcoes = `
                    <div style="background: #f0f0f0; padding: 10px; border-radius: 5px;">
                        <strong>Coluna A:</strong><br>${q.coluna_a ? q.coluna_a.join('<br>') : q.opcoes}<br><br>
                        <strong>Coluna B:</strong><br>${q.coluna_b ? q.coluna_b.join('<br>') : q.opcoes[1]}
                        <p><small>Sequência correta esperada: ${q.correta}</small></p>
                    </div>
                `;
            }

            return `
                <div class="questao-container" id="q-box-${q.id}">
                    <span class="tag-artigo">${q.artigo || 'Geral'}</span>
                    <p><strong>Questão ${q.id}:</strong> ${q.pergunta}</p>
                    <div class="opcoes-lista">${htmlOpcoes}</div>
                    <button class="btn-conferir" onclick="mostrarGabarito(${q.id})">Ver Resposta & Comentário</button>
                    <div id="comentario-${q.id}" class="comentario">
                        <strong>Gabarito: ${q.correta}</strong><br>
                        ${q.comentario}
                    </div>
                </div>
            `;
        }).join('');
    }

    function mostrarGabarito(id) {
        const com = document.getElementById(`comentario-${id}`);
        com.style.display = (com.style.display === 'block') ? 'none' : 'block';
    }

    function voltar() {
        document.getElementById('view-materias').classList.remove('hidden');
        document.getElementById('view-questoes').classList.add('hidden');
    }

    // Inicialização
    window.onload = carregarMenu;
</script>
</body>
</html>
