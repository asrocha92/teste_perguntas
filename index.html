<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --light: #ecf0f1;
            --success: #27ae60;
            --success-light: #d4edda;
            --danger: #c0392b;
            --danger-light: #f8d7da;
            --warning: #e67e22;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }

        /* Menu de Matérias */
        .card-materia {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .card-materia:hover {
            background: #1a252f;
            transform: translateY(-2px);
        }

        /* Navegação e Progresso */
        .progresso {
            background: #eee;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .barra {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .controles {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }

        /* Questão */
        .questao-box { min-height: 300px; }

        .tag-artigo {
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            display: inline-block;
            margin-bottom: 10px;
        }

        .tipo-badge {
            background: var(--warning);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 10px;
        }

        .info-questao {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .opcao-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .opcao-item:hover:not(.bloqueada) { background: #f0f7ff; }

        .opcao-item.selecionada {
            background: #e8f4fd;
            border-color: var(--accent);
        }

        .opcao-item.correta {
            background: var(--success-light);
            border-color: var(--success);
            color: #155724;
        }

        .opcao-item.incorreta {
            background: var(--danger-light);
            border-color: var(--danger);
            color: #721c24;
        }

        .opcao-item.bloqueada { cursor: default; }

        .letra-opcao {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e9ecef;
            color: var(--primary);
            font-weight: bold;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .relacionar-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            margin: 10px 0;
        }

        .coluna-relacionar {
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }

        .coluna-relacionar h4 {
            margin: 0;
            padding: 10px;
            background: #f5f5f5;
        }

        .item-coluna-a {
            padding: 10px;
            border-top: 1px solid #eee;
        }

        .item-relacionar {
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
        }

        .item-relacionar.correta {
            background: var(--success-light);
            border-color: var(--success);
        }

        .item-relacionar.incorreta {
            background: var(--danger-light);
            border-color: var(--danger);
        }

        .campo-relacionar {
            margin-top: 8px;
        }

        .campo-relacionar input {
            width: 85px;
            padding: 8px;
            text-align: center;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 1em;
        }

        .numero-correto {
            margin-left: 10px;
            color: var(--danger);
            font-weight: bold;
        }

        .comentario {
            margin-top: 15px;
            padding: 15px;
            background: #e8f4fd;
            border-left: 5px solid var(--accent);
            border-radius: 4px;
        }

        .comentario.acerto {
            background: var(--success-light);
            border-left-color: var(--success);
        }

        .comentario.erro {
            background: var(--danger-light);
            border-left-color: var(--danger);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-nav { background: var(--primary); color: white; }
        .btn-nav:hover:not(:disabled) { background: #1a252f; }
        .btn-check { background: var(--success); color: white; }
        .btn-check:hover:not(:disabled) { background: #1e8449; }
        .btn-voltar { background: #95a5a6; color: white; margin-bottom: 20px; }
        .btn-voltar:hover { background: #7f8c8d; }

        @media (max-width: 650px) {
            body { padding: 8px; }
            .container { padding: 18px; }
            .relacionar-grid { grid-template-columns: 1fr; }
            .controles { flex-wrap: wrap; }
            .controles button { flex: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="view-menu">
        <h1>📚 Simulado</h1>
        <p style="color:#666; margin-bottom:20px;">Selecione uma matéria para iniciar o simulado:</p>
        <div id="lista-materias"></div>
    </div>

    <div id="view-simulado" class="hidden">
        <button class="btn-voltar" onclick="irParaMenu()">← Voltar</button>

        <div class="progresso">
            <div id="barra-progresso" class="barra"></div>
        </div>

        <p>
            Questão <span id="num-atual">0</span> de <span id="total-questoes">0</span>
            — Acertos: <strong id="placar">0</strong>
        </p>

        <div id="questao-atual" class="questao-box"></div>

        <div class="controles">
            <button class="btn-nav" id="btn-anterior" onclick="mudarQuestao(-1)">Anterior</button>
            <button class="btn-check" id="btn-responder" onclick="corrigirQuestao()">Responder</button>
            <button class="btn-nav" id="btn-proxima" onclick="mudarQuestao(1)" disabled>Próxima →</button>
        </div>
    </div>
</div>

<script>
    let dadosQuestoes = [];
    let indiceAtual = 0;
    let respostas = [];
    let acertos = 0;

    const arquivos = {
        susp: 'questoes_susp.json',
        historia: 'questoes_historia.json',
        mkp: 'mkp.json',
        edo: 'questao_edo.json',
        criminologia: 'questao_criminologia.json'
    };

    const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    function escapar(texto) {
        return String(texto ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
    }

    function normalizarTipo(tipo) {
        const valor = String(tipo || 'multipla_escolha').toLowerCase().replaceAll('-', '_');
        if (['vf', 'verdadeiro/falso', 'verdadeiro_falso'].includes(valor)) return 'verdadeiro_falso';
        if (['relacionar', 'associar', 'correlacionar'].includes(valor)) return 'relacionar';
        if (['resposta_curta', 'dissertativa', 'aberta'].includes(valor)) return 'resposta_curta';
        return 'multipla_escolha';
    }

    function obterOpcoes(q) {
        return q.opcoes || q.alternativas || [];
    }

    function obterIndiceCorreto(q) {
        const opcoes = obterOpcoes(q);
        const correta = q.correta ?? q.resposta;

        if (typeof correta === 'number') return correta;

        const valor = String(correta ?? '').trim().toUpperCase();

        if (/^[A-Z]$/.test(valor)) {
            if (normalizarTipo(q.tipo) === 'verdadeiro_falso') {
                return opcoes.findIndex(o => String(o).trim().toUpperCase().startsWith(valor));
            }
            return letras.indexOf(valor);
        }

        return opcoes.findIndex(o => String(o).trim().toUpperCase() === valor);
    }

    function obterGabaritoRelacionar(q) {
        const correta = q.correta ?? q.resposta ?? [];

        if (Array.isArray(correta)) return correta.map(Number);

        return String(correta)
            .split(/[,;|\s]+/)
            .map(v => v.replace(/[^0-9]/g, ''))
            .filter(Boolean)
            .map(Number);
    }

    async function carregarMenu() {
        try {
            const res = await fetch('materias.json');
            if (!res.ok) throw new Error('materias.json não encontrado');

            const materias = await res.json();

            document.getElementById('lista-materias').innerHTML = materias.map(m => `
                <div class="card-materia" onclick="iniciarSimulado('${escapar(m.id)}')">
                    <h3>${escapar(m.materia)}</h3>
                    <p style="opacity:0.7; font-size:0.9em; margin:0;">Clique para iniciar</p>
                </div>
            `).join('');
        } catch (error) {
            console.error(error);
            document.getElementById('lista-materias').innerHTML =
                '<p style="color:red;">Erro ao carregar matérias. Verifique o arquivo materias.json.</p>';
        }
    }

    async function iniciarSimulado(id) {
        try {
            const arquivo = arquivos[id] || `questoes_${id}.json`;
            const res = await fetch(arquivo);

            if (!res.ok) throw new Error(`Arquivo ${arquivo} não encontrado`);

            const conteudo = await res.json();
            dadosQuestoes = Array.isArray(conteudo) ? conteudo : (conteudo.questoes || []);

            if (!dadosQuestoes.length) throw new Error('Arquivo de questões vazio ou inválido');

            indiceAtual = 0;
            acertos = 0;
            respostas = dadosQuestoes.map(() => ({
                respondida: false,
                resposta: null,
                acertou: false
            }));

            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-simulado').classList.remove('hidden');
            mostrarQuestao();
        } catch (error) {
            console.error(error);
            alert(`Erro ao carregar questões: ${error.message}`);
        }
    }

    function mostrarQuestao() {
        const q = dadosQuestoes[indiceAtual];
        const estado = respostas[indiceAtual];
        const total = dadosQuestoes.length;
        const tipo = normalizarTipo(q.tipo);

        document.getElementById('num-atual').innerText = indiceAtual + 1;
        document.getElementById('total-questoes').innerText = total;
        document.getElementById('placar').innerText = acertos;
        document.getElementById('barra-progresso').style.width =
            ((indiceAtual + 1) / total * 100) + '%';

        const tipoLabel =
            tipo === 'verdadeiro_falso' ? 'Verdadeiro/Falso' :
            tipo === 'relacionar' ? 'Relacionar' :
            tipo === 'resposta_curta' ? 'Resposta curta' :
            'Múltipla Escolha';

        let htmlOpcoes = tipo === 'relacionar'
            ? montarRelacionar(q, estado)
            : tipo === 'resposta_curta'
                ? montarRespostaCurta(q, estado)
                : montarAlternativas(q, estado);

        let feedback = '';

        if (estado.respondida) {
            const comentario = q.comentario || q.justificativa || q.explicacao ||
                'Sem justificativa disponível.';

            feedback = `
                <div class="comentario ${estado.acertou ? 'acerto' : 'erro'}">
                    <strong>${estado.acertou ? '✅ Resposta correta!' : '❌ Resposta incorreta.'}</strong>
                    <br><br>
                    <strong>Justificativa:</strong> ${escapar(comentario)}
                </div>
            `;
        }

        document.getElementById('questao-atual').innerHTML = `
            <div class="info-questao">
                <span class="tag-artigo">📖 ${escapar(q.artigo || 'Geral')}</span>
                <span class="tipo-badge">${tipoLabel}</span>
                <span style="margin-left:10px; color:#999;">ID: ${escapar(q.id || '--')}</span>
            </div>
            <h3>${escapar(q.pergunta || q.enunciado)}</h3>
            <div id="opcoes">${htmlOpcoes}</div>
            ${feedback}
        `;

        document.getElementById('btn-anterior').disabled = indiceAtual === 0;
        document.getElementById('btn-responder').disabled = estado.respondida;
        document.getElementById('btn-proxima').disabled = !estado.respondida;
        document.getElementById('btn-proxima').innerText =
            indiceAtual === total - 1 ? 'Finalizar' : 'Próxima →';
    }

    function montarAlternativas(q, estado) {
        const opcoes = obterOpcoes(q);
        const correta = obterIndiceCorreto(q);

        return opcoes.map((opcao, i) => {
            let classes = '';

            if (estado.respondida) {
                classes += ' bloqueada';
                if (i === correta) classes += ' correta';
                else if (i === estado.resposta) classes += ' incorreta';
            } else if (i === estado.resposta) {
                classes += ' selecionada';
            }

            return `
                <label class="opcao-item${classes}" onclick="selecionarOpcao(${i})">
                    <input type="radio" name="resposta"
                        ${estado.resposta === i ? 'checked' : ''}
                        ${estado.respondida ? 'disabled' : ''}>
                    <span class="letra-opcao">${letras[i]}</span>
                    <span>${escapar(opcao)}</span>
                </label>
            `;
        }).join('');
    }

    function montarRelacionar(q, estado) {
        const gabarito = obterGabaritoRelacionar(q);
        const respostasAtuais = Array.isArray(estado.resposta)
            ? estado.resposta
            : (q.coluna_b || []).map(() => '');

        const colunaA = (q.coluna_a || []).map((item, i) => `
            <div class="item-coluna-a">
                <strong>${i + 1}.</strong> ${escapar(item)}
            </div>
        `).join('');

        const colunaB = (q.coluna_b || []).map((item, i) => {
            let classe = '';
            let corretoHtml = '';

            if (estado.respondida) {
                const acertouItem = Number(respostasAtuais[i]) === Number(gabarito[i]);
                classe = acertouItem ? ' correta' : ' incorreta';

                if (!acertouItem) {
                    corretoHtml = `<span class="numero-correto">Correto: ${gabarito[i]}</span>`;
                }
            }

            return `
                <div class="item-relacionar${classe}">
                    <strong>${letras[i]}.</strong> ${escapar(item)}
                    <div class="campo-relacionar">
                        <label>
                            Número correspondente:
                            <input type="number"
                                min="1"
                                max="${(q.coluna_a || []).length}"
                                value="${escapar(respostasAtuais[i])}"
                                ${estado.respondida ? 'disabled' : ''}
                                oninput="salvarRespostaRelacionar(${i}, this.value)">
                        </label>
                        ${corretoHtml}
                    </div>
                </div>
            `;
        }).join('');

        return `
            <div class="relacionar-grid">
                <div class="coluna-relacionar">
                    <h4>Coluna A</h4>
                    ${colunaA}
                </div>
                <div>
                    <h4 style="margin-top:0;">Coluna B — informe o número abaixo de cada item</h4>
                    ${colunaB}
                </div>
            </div>
        `;
    }


    function montarRespostaCurta(q, estado) {
        const valor = estado.resposta || '';
        let modelo = '';

        if (estado.respondida) {
            modelo = `
                <div style="margin-top:12px; padding:12px; background:#f5f5f5; border-radius:6px;">
                    <strong>Resposta esperada:</strong><br>
                    ${escapar(q.resposta_modelo || q.correta || 'Consulte a justificativa.')}
                </div>
            `;
        }

        return `
            <label style="display:block; font-weight:bold; margin-bottom:8px;">
                Digite sua resposta:
            </label>
            <textarea id="resposta-curta"
                rows="7"
                ${estado.respondida ? 'disabled' : ''}
                oninput="salvarRespostaCurta(this.value)"
                style="width:100%; padding:12px; border:2px solid #ddd; border-radius:6px; resize:vertical;">${escapar(valor)}</textarea>
            ${modelo}
        `;
    }

    function salvarRespostaCurta(valor) {
        if (respostas[indiceAtual].respondida) return;
        respostas[indiceAtual].resposta = valor;
    }

    function normalizarTextoResposta(texto) {
        return String(texto || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase()
            .replace(/[^a-z0-9\s]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function avaliarRespostaCurta(q, resposta) {
        const texto = normalizarTextoResposta(resposta);
        const aceitas = q.respostas_aceitas || [];

        if (!texto || !aceitas.length) return false;

        return aceitas.some(modelo => {
            const palavras = normalizarTextoResposta(modelo)
                .split(' ')
                .filter(p => p.length > 3);

            if (!palavras.length) return false;

            const encontradas = palavras.filter(p => texto.includes(p)).length;
            return encontradas >= Math.max(2, Math.ceil(palavras.length * 0.45));
        });
    }

    function selecionarOpcao(index) {
        if (respostas[indiceAtual].respondida) return;

        respostas[indiceAtual].resposta = index;
        mostrarQuestao();
    }

    function salvarRespostaRelacionar(index, valor) {
        const estado = respostas[indiceAtual];

        if (estado.respondida) return;

        if (!Array.isArray(estado.resposta)) {
            estado.resposta = (dadosQuestoes[indiceAtual].coluna_b || []).map(() => '');
        }

        estado.resposta[index] = valor;
    }

    function corrigirQuestao() {
        const q = dadosQuestoes[indiceAtual];
        const estado = respostas[indiceAtual];
        const tipo = normalizarTipo(q.tipo);

        if (tipo === 'relacionar') {
            if (!Array.isArray(estado.resposta) ||
                estado.resposta.some(v => String(v).trim() === '')) {
                alert('Informe o número correspondente em todos os itens.');
                return;
            }

            const gabarito = obterGabaritoRelacionar(q);

            estado.acertou = estado.resposta.every(
                (valor, i) => Number(valor) === Number(gabarito[i])
            );
        } else if (tipo === 'resposta_curta') {
            if (!estado.resposta || !String(estado.resposta).trim()) {
                alert('Digite uma resposta antes de corrigir.');
                return;
            }

            estado.acertou = avaliarRespostaCurta(q, estado.resposta);
        } else {
            if (estado.resposta === null || estado.resposta === undefined) {
                alert('Selecione uma alternativa antes de responder.');
                return;
            }

            estado.acertou = Number(estado.resposta) === Number(obterIndiceCorreto(q));
        }

        estado.respondida = true;

        if (estado.acertou) acertos++;

        mostrarQuestao();
    }

    function mudarQuestao(direcao) {
        if (direcao > 0 && !respostas[indiceAtual].respondida) return;

        const novoIndice = indiceAtual + direcao;

        if (novoIndice >= 0 && novoIndice < dadosQuestoes.length) {
            indiceAtual = novoIndice;
            mostrarQuestao();
        } else if (novoIndice >= dadosQuestoes.length) {
            finalizarSimulado();
        }
    }

    function finalizarSimulado() {
        const total = dadosQuestoes.length;
        const percentual = Math.round((acertos / total) * 100);

        document.getElementById('questao-atual').innerHTML = `
            <div style="text-align:center; padding:30px 10px;">
                <h2>✅ Simulado concluído!</h2>
                <p style="font-size:1.25em;">
                    Você acertou <strong>${acertos}</strong> de <strong>${total}</strong> questões.
                </p>
                <p>Desempenho: <strong>${percentual}%</strong></p>
                <button class="btn-nav" onclick="irParaMenu()">Voltar ao menu</button>
            </div>
        `;

        document.querySelector('.controles').classList.add('hidden');
    }

    function irParaMenu() {
        document.getElementById('view-simulado').classList.add('hidden');
        document.getElementById('view-menu').classList.remove('hidden');
        document.querySelector('.controles').classList.remove('hidden');
    }

    window.onload = carregarMenu;
</script>
</body>
</html>
