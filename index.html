<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado PMPR - Feedback Imediato</title>
    <style>
        :root {
            --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --error: #c0392b; --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { background: #fff; width: 100%; max-width: 750px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid var(--secondary); margin-bottom: 20px; text-align: center; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 0.3s; }
        .question-box { display: none; }
        .question-box.active { display: block; }
        .option-item { margin-bottom: 12px; position: relative; }
        .option-item label { display: block; padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option-item input { display: none; }
        .option-item input:checked + label { border-color: var(--secondary); background: #e1effe; }
        
        /* Cores de Feedback */
        .correct-choice label { border-color: var(--success) !important; background: #d4edda !important; color: #155724; font-weight: bold; }
        .wrong-choice label { border-color: var(--error) !important; background: #f8d7da !important; color: #721c24; }
        
        #feedback-msg { margin-top: 15px; font-weight: bold; font-size: 1.1rem; text-align: center; min-height: 25px; }
        .btn-area { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; }
        #action-btn { background: var(--secondary); color: white; }
        #results-screen { display: none; text-align: center; }
        .history-list { text-align: left; background: #f1f1f1; padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <div class="header">
            <h2 id="counter">Questão 1 de 21</h2>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div id="questions-area"></div>
        <div id="feedback-msg"></div>
        <div class="btn-area">
            <button id="action-btn" onclick="handleButtonClick()">Verificar Resposta</button>
        </div>
    </div>

    <div id="results-screen">
        <h2>Simulado Concluído</h2>
        <p style="font-size: 1.2rem">Acertos: <span id="final-score">0</span>/21 (<span id="final-percent">0%</span>)</p>
        <h3>Seu Histórico (Últimos 5):</h3>
        <div id="history-area" class="history-list"></div>
        <button onclick="location.reload()" style="background: var(--primary); color: white; width: 100%; margin-top: 20px;">Reiniciar Simulado</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. Qual a data de emancipação política do Paraná?", options: {A: "12 de outubro de 1822", B: "29 de agosto de 1853", C: "07 de setembro de 1889", D: "15 de novembro de 1889"}, correct: "B" },
        { q: "2. Qual fator iniciou a Guerra do Contestado?", options: {A: "Disputa de ouro", B: "Demissão em massa na Brazil Railway Company", C: "Invasão argentina", D: "Taxas do café"}, correct: "B" },
        { q: "3. Inovação tática marcante no Contestado:", options: {A: "Tanques pesados", B: "Plebiscito popular", C: "Uso de aviação militar contra civis", D: "Anexação argentina"}, correct: "C" },
        { q: "4. Atribuição correta das unidades BPRV e BPMA:", options: {A: "BPRV: Rodovias; BPMA: Crimes Ambientais", B: "BPRV: Aéreo; BPMA: Ferroviário", C: "BPRV: Bancário; BPMA: Fronteiras", D: "BPRV: Urbano; BPMA: Escolta"}, correct: "A" },
        { q: "5. NÃO é objetivo da História da PMPR:", options: {A: "Sentimento de pertencimento", B: "Isentar o policial do estrito cumprimento da legalidade", C: "Refletir sobre erros", D: "Fortalecer disciplina"}, correct: "B" },
        { q: "6. Característica do solo do Terceiro Planalto:", options: {A: "Arenoso", B: "Terra roxa fértil (vulcanismo)", C: "Massapê calcário", D: "Podzólico marinho"}, correct: "B" },
        { q: "7. O que representam as três elevações no brasão da PMPR?", options: {A: "Bacias hidrográficas", B: "Os três planaltos paranaenses", C: "Três poderes", D: "Três cidades coloniais"}, correct: "B" },
        { q: "8. Ano do nome 'Polícia Militar do Estado do Paraná':", options: {A: "1892", B: "1917", C: "1932", D: "1946"}, correct: "D" },
        { q: "9. Origem do capacete Pickelhaube:", options: {A: "França", B: "Reino da Prússia (1842)", C: "Império Britânico", D: "Itália"}, correct: "B" },
        { q: "10. Motivo fiscal da Inconfidência Mineira:", options: {A: "Imposto do pau-brasil", B: "A 'Derrama'", C: "Fim da escravidão", D: "Confisco de terras"}, correct: "B" },
        { q: "11. Por que Tiradentes foi o único executado?", options: {A: "Era o líder financeiro", B: "Elite agrária", C: "Tentou matar a Rainha", D: "Patente mais baixa (alferes) e assumiu culpa"}, correct: "D" },
        { q: "12. Estratégia paranaense para ganhar autonomia em 1853:", options: {A: "Apoio em 1822", B: "Neutralidade no Paraguai", C: "Fidelidade contra a Rev. Farroupilha", D: "Financiamento da Corte"}, correct: "C" },
        { q: "13. Modelo da Companhia de Força Policial (1854):", options: {A: "Marinha Inglesa", B: "Gendarmeria Francesa", C: "Batedores do Prata", D: "Exército Alemão"}, correct: "B" },
        { q: "14. Ingresso feminino na PMPR:", options: {A: "Pós-1988", B: "19 de abril de 1977", C: "Desde 1854", D: "Apenas nos anos 2000"}, correct: "B" },
        { q: "15. Missão da PM (Art. 144 CF):", options: {A: "Investigação civil", B: "Patrulha federal", C: "Polícia ostensiva e ordem pública", D: "Guarda de presídios"}, correct: "C" },
        { q: "16. Proibição ao militar (Art. 42 CF):", options: {A: "Voto", B: "Sindicalização e greve", C: "Porte de arma", D: "Ensino superior"}, correct: "B" },
        { q: "17. NÃO era atividade da PMPR na Guerra do Paraguai:", options: {A: "Logística", B: "Linha de frente", C: "Defesa territorial", D: "Comando da Marinha"}, correct: "D" },
        { q: "18. Importância do Rio da Prata no conflito:", options: {A: "Barreira física", B: "Motivo geopolítico central", C: "Linha de Tordesilhas", D: "Zona neutra"}, correct: "B" },
        { q: "19. Corrente que foca na consolidação dos Estados-Nação:", options: {A: "Tradicional", B: "Revisionista", C: "Nova Historiografia", D: "Imperial"}, correct: "C" },
        { q: "20. Tragédia da Batalha de Acosta Ñu:", options: {A: "Morte de Solano", B: "Massacre de 500 crianças paraguaias", C: "Fim da fundição", D: "Mísseis balísticos"}, correct: "B" },
        { q: "21. Papel das PMs em guerra internacional:", options: {A: "Autônomas", B: "Forças auxiliares e reserva do Exército", C: "Paramilitares privadas", D: "Submetidas à ONU"}, correct: "B" }
    ];

    let currentIdx = 0, score = 0, isChecking = true;

    function init() {
        const area = document.getElementById('questions-area');
        questions.forEach((q, i) => {
            let opts = '';
            for (let k in q.options) {
                opts += `<div class="option-item" id="opt-container-${i}-${k}">
                    <input type="radio" name="q${i}" id="q${i}${k}" value="${k}">
                    <label for="q${i}${k}">${k}) ${q.options[k]}</label>
                </div>`;
            }
            area.innerHTML += `<div class="question-box" id="box-${i}">${q.q}<div style="margin-top:15px">${opts}</div></div>`;
        });
        updateDisplay();
        loadHistory();
    }

    function handleButtonClick() {
        const btn = document.getElementById('action-btn');
        if (isChecking) {
            verifyAnswer();
        } else {
            nextQuestion();
        }
    }

    function verifyAnswer() {
        const selected = document.querySelector(`input[name="q${currentIdx}"]:checked`);
        if (!selected) { return alert("Selecione uma opção!"); }

        const correct = questions[currentIdx].correct;
        const feedback = document.getElementById('feedback-msg');
        
        // Bloquear rádio buttons
        document.querySelectorAll(`input[name="q${currentIdx}"]`).forEach(input => input.disabled = true);

        if (selected.value === correct) {
            score++;
            feedback.innerText = "CORRETO!";
            feedback.style.color = "var(--success)";
            document.getElementById(`opt-container-${currentIdx}-${correct}`).classList.add('correct-choice');
        } else {
            feedback.innerText = `INCORRETO. A resposta certa era ${correct}.`;
            feedback.style.color = "var(--error)";
            document.getElementById(`opt-container-${currentIdx}-${selected.value}`).classList.add('wrong-choice');
            document.getElementById(`opt-container-${currentIdx}-${correct}`).classList.add('correct-choice');
        }

        document.getElementById('action-btn').innerText = (currentIdx < questions.length - 1) ? "Próxima Questão" : "Ver Resultado Final";
        isChecking = false;
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            isChecking = true;
            document.getElementById('action-btn').innerText = "Verificar Resposta";
            document.getElementById('feedback-msg').innerText = "";
            updateDisplay();
        } else {
            showFinalResults();
        }
    }

    function updateDisplay() {
        document.querySelectorAll('.question-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`box-${currentIdx}`).classList.add('active');
        document.getElementById('counter').innerText = `Questão ${currentIdx + 1} de ${questions.length}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
    }

    function showFinalResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        const pct = ((score / 21) * 100).toFixed(1);
        document.getElementById('final-percent').innerText = pct + "%";
        saveHistory(score, pct);
    }

    function saveHistory(s, p) {
        let h = JSON.parse(localStorage.getItem('pmpr_v2')) || [];
        h.unshift({ d: new Date().toLocaleString('pt-BR'), s, p });
        localStorage.setItem('pmpr_v2', JSON.stringify(h.slice(0, 5)));
        loadHistory();
    }

    function loadHistory() {
        let h = JSON.parse(localStorage.getItem('pmpr_v2')) || [];
        document.getElementById('history-area').innerHTML = h.length ? h.map(x => `<div>${x.d}: ${x.s}/21 (${x.p}%)</div>`).join('') : "Sem histórico.";
    }

    window.onload = init;
</script>
</body>
</html>
