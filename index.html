<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulado</title>
<style>
body{font-family:Arial;background:#ecf0f1;margin:0;padding:20px}.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px}
.hidden{display:none}.card{background:#2c3e50;color:#fff;padding:15px;margin:10px 0;cursor:pointer;border-radius:8px}
.opcao{display:block;border:1px solid #ccc;padding:10px;margin:8px 0;border-radius:6px;cursor:pointer}
.barra{height:10px;background:#3498db;width:0}.prog{background:#ddd}.coment{display:none;background:#eef;padding:10px;margin-top:10px}
button{padding:10px 16px;margin:5px}
</style></head><body>
<div class="container">
<div id="menu"><h2>Simulados</h2><div id="lista"></div></div>
<div id="sim" class="hidden">
<button onclick="voltar()">Voltar</button>
<div class="prog"><div id="barra" class="barra"></div></div>
<p><span id="atual"></span>/<span id="total"></span> | Acertos: <span id="ac">0</span> Erros: <span id="er">0</span></p>
<div id="q"></div>
<button onclick="ant()">Anterior</button><button onclick="corrigir()">Responder</button><button onclick="prox()">Próxima</button>
</div></div>
<script>
let questoes=[],i=0,ac=0,er=0;
async function init(){
let m=await fetch('materias.json').then(r=>r.json());
lista.innerHTML=m.map(x=>`<div class=card onclick="abrir('${x.id}')">${x.materia}</div>`).join('');
}
async function abrir(id){
let arq=id.endsWith('.json')?id:`questoes_${id}.json`;
questoes=await fetch(arq).then(r=>r.json());
i=0;ac=0;er=0;
menu.classList.add('hidden');sim.classList.remove('hidden');mostrar();
}
function mostrar(){
let x=questoes[i],ops=x.opcoes||['V','F'];
atual.textContent=i+1;total.textContent=questoes.length;
barra.style.width=((i+1)/questoes.length*100)+'%';
q.innerHTML=`<h3>${x.pergunta}</h3>`+
ops.map(o=>`<label class=opcao><input type=radio name=r value="${o}"> ${o}</label>`).join('')+
`<div id=f class=coment></div>`;
ac.textContent=ac;er.textContent=er;
}
function corrigir(){
let r=document.querySelector('input[name=r]:checked');if(!r){alert('Escolha uma resposta');return;}
let x=questoes[i],c=String(x.correta);
let ok=r.value===c;if(ok)ac++;else er++;
document.getElementById('ac').textContent=ac;
document.getElementById('er').textContent=er;
let f=document.getElementById('f');
f.style.display='block';
f.innerHTML=`<b>${ok?'✔ Acertou':'✘ Errou'}</b><br>Resposta: ${c}<br><br>${x.comentario||''}`;
}
function prox(){if(i<questoes.length-1){i++;mostrar()}else alert('Fim');}
function ant(){if(i>0){i--;mostrar();}}
function voltar(){sim.classList.add('hidden');menu.classList.remove('hidden');}
window.onload=init;
</script></body></html>
