<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Historia com Chat</title>
    <style>
        :root {
            --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --error: #c0392b; --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Container Principal */
        #main-layout { display: flex; width: 100%; transition: 0.3s; }
        .quiz-container { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .quiz-card { background: #fff; width: 100%; max-width: 700px; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); align-self: flex-start; }

        /* Tela de Login */
        #login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .login-box { text-align: center; background: rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; }
        .login-box input { padding: 10px; border-radius: 5px; border: none; width: 250px; margin-bottom: 15px; }

        /* Chat Lateral */
        #chat-sidebar { width: 300px; background: #fff; border-left: 2px solid #ddd; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        #chat-sidebar.minimized { width: 40px; }
        .chat-header { background: var(--primary); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .chat-messages { flex-grow: 1; padding: 10px; overflow-y: auto; display: block; }
        #chat-sidebar.minimized .chat-messages, #chat-sidebar.minimized .chat-input-area { display: none; }
        .chat-input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; }
        .chat-input-area input { flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .msg { margin-bottom: 8px; font-size: 0.9rem; }
        .msg b { color: var(--secondary); }

        /* Estilos do Quiz (Baseados nas imagens) */
        .question-box { display: none; }
        .question-box.active { display: block; }
        .option-item { margin: 10px 0; }
        .option-item label { display: block; padding: 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .option-item input:checked + label { background: #e1effe; border-color: var(--secondary); }
        .correct { background: #d4edda !important; border-color: var(--success) !important; }
        .wrong { background: #f8d7da !important; border-color: var(--error) !important; }
        button { cursor: pointer; padding: 10px 20px; background: var(--secondary); color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<!-- Tela Inicial de Nome -->
<div id="login-screen">
    <div class="login-box">
        <h2>Simulado</h2>
        <p>Informe seu nome para começar:</p>
        <input type="text" id="user-name" placeholder="Seu nome ou Grito de Guerra"><br>
        <button onclick="startApp()">Entrar no Simulado</button>
    </div>
</div>

<div id="main-layout">
    <!-- Área do Quiz -->
    <div class="quiz-container">
        <div class="quiz-card" id="quiz-card" style="display:none;">
            <div id="quiz-header">
                <h3 id="progress-text">Questão 1 de 21</h3>
                <div id="user-display" style="font-size: 0.8rem; color: #666;"></div>
            </div>
            <hr>
            <div id="questions-area"></div>
            <div id="feedback" style="margin: 15px 0; font-weight: bold;"></div>
            <button id="action-btn" onclick="handleQuiz()">Verificar Resposta</button>
        </div>
        
        <!-- Tela de Resultados -->
        <div class="quiz-card" id="results-screen" style="display:none; text-align: center;">
            <h2>Fim do Simulado!</h2>
            <p id="final-stats"></p>
            <button onclick="location.reload()">Reiniciar</button>
        </div>
    </div>

    <!-- Chat Lateral -->
    <div id="chat-sidebar" id="chat-sidebar">
        <div class="chat-header" onclick="toggleChat()">
            <span id="chat-title">Chat Público</span>
            <span id="toggle-icon">[-]</span>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="msg"><i>Bem-vindo ao chat de estudos!</i></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="padding: 5px 10px; margin-left: 5px;">></button>
        </div>
    </div>
</div>

<script>
    // Configurações WebSocket
    let socket;
    let userName = "";
    const wsUrl = "ws://localhost:8080"; // Altere para o seu servidor real se houver

    // Dados das Questões (Conforme imagens das fontes) [1-6]
    const questions = [
        { q: "1. Antiga denominação do território paranaense e data de emancipação:", options: {A: "Comarca de Paranaguá (SP); 29/08/1853", B: "Província das Araucárias (SC); 12/10/1822", C: "Comarca de Curitiba (RJ); 07/09/1889", D: "Província do Guairá (MT); 15/11/1889"}, correct: "A" },
        { q: "2. Fator socioeconômico determinante no Contestado (1912-1916):", options: {A: "Disputa de ouro", B: "Demissão de operários da Brazil Railway Company", C: "Invasão argentina", D: "Taxas do café"}, correct: "B" },
        { q: "3. Inovação tática marcante no Contestado:", options: {A: "Blindados terrestres", B: "Plebiscito popular", C: "Uso de aviação militar contra civis", D: "Mísseis balísticos"}, correct: "C" },
        { q: "4. Atribuição correta BPRV / BPMA:", options: {A: "Aéreo / Ferroviário", B: "Tráfico animais / Rodovias Federais", C: "Crimes bancários / Mares", D: "Segurança viária (BR-277) / Crimes ambientais (Palmito)"}, correct: "D" },
        { q: "5. NÃO é objetivo da História da PMPR:", options: {A: "Sentimento pertencimento", B: "Isentar o policial da legalidade", C: "Refletir sobre erros", D: "Fortalecer disciplina"}, correct: "B" },
        { q: "6. Solo do Terceiro Planalto (Guarapuava):", options: {A: "Arenoso", B: "Terra roxa (derrames vulcânicos)", C: "Massapê", D: "Podzólico"}, correct: "B" },
        { q: "7. Representação das 3 elevações no brasão PMPR:", options: {A: "Bacias hidrográficas", B: "Os três planaltos paranaenses", C: "Três poderes", D: "Três cidades coloniais"}, correct: "B" },
        { q: "8. Ano do nome 'Polícia Militar do Estado do Paraná':", options: {A: "1892", B: "1917", C: "1932", D: "1946"}, correct: "D" },
        { q: "9. Origem do capacete Pickelhaube:", options: {A: "França", B: "Reino da Prússia (1842)", C: "Inglaterra", D: "Itália"}, correct: "B" },
        { q: "10. Temor fiscal da Inconfidência Mineira:", options: {A: "Imposto madeira", B: "Prática da 'Derrama'", C: "Fim escravidão", D: "Confisco terras"}, correct: "B" },
        { q: "11. Por que Tiradentes foi o único executado?", options: {A: "Líder rico", B: "Elite agrária", C: "Matou a Rainha", D: "Patente mais baixa (alferes) e assumiu culpa"}, correct: "D" },
        { q: "12. Estratégia paranaense para autonomia em 1853:", options: {A: "Apoio 1822", B: "Neutralidade", C: "Fidelidade contra a Rev. Farroupilha", D: "Financiamento da Corte"}, correct: "C" },
        { q: "13. Modelo da Força Policial de 1854:", options: {A: "Inglês", B: "Gendarmeria Francesa", C: "Batedores", D: "Exército Alemão"}, correct: "B" },
        { q: "14. Ingresso feminino na PMPR:", options: {A: "Pós-1988", B: "19 de abril de 1977 (2º estado do Brasil)", C: "1854", D: "Anos 2000"}, correct: "B" },
        { q: "15. Missão PM (Art. 144 CF):", options: {A: "Investigação", B: "Rodovias Federais", C: "Polícia ostensiva e ordem pública", D: "Presídios"}, correct: "C" },
        { q: "16. Proibição ao militar (Art. 42 CF):", options: {A: "Voto", B: "Sindicalização e greve", C: "Porte arma", D: "Ensino superior"}, correct: "B" },
        { q: "17. Guerra Paraguai - NÃO era função da PMPR:", options: {A: "Logística", B: "Frente de combate", C: "Defesa territorial", D: "Comando da Marinha Imperial"}, correct: "D" },
        { q: "18. Importância do Rio da Prata:", options: {A: "Barreira", B: "Motivo geopolítico central", C: "Tordesilhas", D: "Zona neutra"}, correct: "B" },
        { q: "19. Corrente 'Estados-Nação':", options: {A: "Tradicional", B: "Revisionista", C: "Nova Historiografia", D: "Imperial"}, correct: "C" },
        { q: "20. Batalha de Acosta Ñu (1869):", options: {A: "Vitória Solano", B: "Massacre de 500 crianças paraguaias", C: "Ibicuí", D: "Mísseis"}, correct: "B" },
        { q: "21. Papel das PMs em guerra internacional:", options: {A: "Autônomas", B: "Forças auxiliares e reserva do Exército", C: "Privadas", D: "ONU"}, correct: "B" }
    ];

    let currentIdx = 0;
    let score = 0;
    let checking = true;

    function startApp() {
        const nameInput = document.getElementById('user-name');
        if(!nameInput.value.trim()) return alert("Digite seu nome!");
        
        userName = nameInput.value;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-card').style.display = 'block';
        document.getElementById('user-display').innerText = "Soldado: " + userName;
        
        initQuiz();
        setupWebSocket();
    }

    function setupWebSocket() {
        try {
            socket = new WebSocket(wsUrl);
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                appendMessage(data.user, data.text);
            };
            socket.onerror = () => appendMessage("Sistema", "Servidor offline. Chat local apenas.");
        } catch(e) { console.log("Erro WS"); }
    }

    function toggleChat() {
        const side = document.getElementById('chat-sidebar');
        const icon = document.getElementById('toggle-icon');
        side.classList.toggle('minimized');
        icon.innerText = side.classList.contains('minimized') ? "[+]" : "[-]";
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        
        const msgData = { user: userName, text: input.value };
        if(socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify(msgData));
        }
        appendMessage("Você", input.value);
        input.value = "";
    }

    function appendMessage(user, text) {
        const container = document.getElementById('chat-messages');
        container.innerHTML += `<div class="msg"><b>${user}:</b> ${text}</div>`;
        container.scrollTop = container.scrollHeight;
    }

    // Lógica do Quiz
    function initQuiz() {
        const area = document.getElementById('questions-area');
        questions.forEach((q, i) => {
            let opts = "";
            for(let key in q.options) {
                opts += `<div class="option-item" id="cont-${i}-${key}">
                            <input type="radio" name="q${i}" id="q${i}${key}" value="${key}">
                            <label for="q${i}${key}">${key}) ${q.options[key]}</label>
                         </div>`;
            }
            area.innerHTML += `<div class="question-box" id="box-${i}">${q.q}${opts}</div>`;
        });
        showQuestion();
    }

    function showQuestion() {
        document.querySelectorAll('.question-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`box-${currentIdx}`).classList.add('active');
        document.getElementById('progress-text').innerText = `Questão ${currentIdx+1} de ${questions.length}`;
    }

    function handleQuiz() {
        if(checking) {
            const selected = document.querySelector(`input[name="q${currentIdx}"]:checked`);
            if(!selected) return alert("Selecione!");
            
            const correct = questions[currentIdx].correct;
            const feedback = document.getElementById('feedback');
            
            if(selected.value === correct) {
                score++;
                feedback.innerText = "Correto! ⚔️";
                feedback.style.color = "var(--success)";
                document.getElementById(`cont-${currentIdx}-${correct}`).classList.add('correct');
            } else {
                feedback.innerText = "Errado. Correta: " + correct;
                feedback.style.color = "var(--error)";
                document.getElementById(`cont-${currentIdx}-${selected.value}`).classList.add('wrong');
                document.getElementById(`cont-${currentIdx}-${correct}`).classList.add('correct');
            }
            document.getElementById('action-btn').innerText = "Próxima";
            checking = false;
        } else {
            currentIdx++;
            if(currentIdx < questions.length) {
                checking = true;
                document.getElementById('feedback').innerText = "";
                document.getElementById('action-btn').innerText = "Verificar Resposta";
                showQuestion();
            } else {
                showResults();
            }
        }
    }

    function showResults() {
        document.getElementById('quiz-card').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        document.getElementById('final-stats').innerText = `${userName}, você acertou ${score} de ${questions.length} questões.`;
    }
</script>
</body>
</html>
