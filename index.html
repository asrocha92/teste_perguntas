<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --light: #ecf0f1; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* Menu de Matérias */
        .card-materia { background: var(--primary); color: white; padding: 20px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .card-materia:hover { background: #1a252f; transform: translateY(-2px); }
        
        /* Navegação e Progresso */
        .progresso { background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .barra { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s; }
        .controles { display: flex; justify-content: space-between; margin-top: 20px; }
        
        /* Questão */
        .questao-box { min-height: 300px; }
        .tag-artigo { background: var(--accent); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.8em; display: inline-block; margin-bottom: 10px; }
        .opcao-item { display: block; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .opcao-item:hover { background: #f0f7ff; }
        .opcao-item.selecionada { background: #d4edda; border-color: var(--success); }
        .opcao-item input { margin-right: 10px; }
        
        .comentario { margin-top: 15px; padding: 15px; background: #e8f4fd; border-left: 5px solid var(--accent); display: none; border-radius: 4px; }
        .comentario strong { color: var(--primary); }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-nav { background: var(--primary); color: white; }
        .btn-nav:hover:not(:disabled) { background: #1a252f; }
        .btn-check { background: var(--success); color: white; }
        .btn-check:hover { background: #1e8449; }
        .btn-voltar { background: #95a5a6; color: white; margin-bottom: 20px; }
        .btn-voltar:hover { background: #7f8c8d; }
        
        .info-questao { color: #666; font-size: 0.9em; margin-bottom: 15px; }
        .tipo-badge { background: #e67e22; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.75em; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- SELEÇÃO DE MATÉRIAS -->
    <div id="view-menu">
        <h1>📚 Simulado</h1>
        <p style="color: #666; margin-bottom: 20px;">Selecione uma matéria para iniciar o simulado:</p>
        <div id="lista-materias"></div>
    </div>

    <!-- ÁREA DO SIMULADO (UMA POR UMA) -->
    <div id="view-simulado" class="hidden">
        <button class="btn-voltar" onclick="irParaMenu()">← Voltar</button>
        
        <div class="progresso"><div id="barra-progresso" class="barra"></div></div>
        <p>Questão <span id="num-atual">0</span> de <span id="total-questoes">0</span></p>

        <div id="questao-atual" class="questao-box">
            <!-- Conteúdo dinâmico -->
        </div>

        <div class="controles">
            <button class="btn-nav" id="btn-anterior" onclick="mudarQuestao(-1)">Anterior</button>
            <button class="btn-check" onclick="toggleComentario()">Ver Resposta</button>
            <button class="btn-nav" id="btn-proxima" onclick="mudarQuestao(1)">Próxima</button>
        </div>
    </div>
</div>

<script>
    let dadosQuestoes = [];
    let indiceAtual = 0;

    // Carrega o menu inicial
    async function carregarMenu() {
        try {
            const res = await fetch('materias.json');
            const materias = await res.json();
            document.getElementById('lista-materias').innerHTML = materias.map(m => `
                <div class="card-materia" onclick="iniciarSimulado('${m.id}')">
                    <h3>${m.materia}</h3>
                    <p style="opacity:0.7; font-size:0.9em; margin:0;">Clique para iniciar</p>
                </div>
            `).join('');
        } catch (error) {
            console.error('Erro ao carregar menu:', error);
            document.getElementById('lista-materias').innerHTML = '<p style="color:red;">Erro ao carregar matérias. Verifique o arquivo materias.json.</p>';
        }
    }

    // Inicia o simulado da matéria escolhida
    async function iniciarSimulado(id) {
        try {
            // Mapeamento dos IDs para os arquivos JSON
            const arquivos = {
                'susp': 'questoes_susp.json',
                'historia': 'questoes_historia.json',
                'mkp': 'mkp.json'
            };
            
            const arquivo = arquivos[id] || `questoes_${id}.json`;
            console.log(`Carregando: ${arquivo}`);
            
            const res = await fetch(arquivo);
            if (!res.ok) {
                throw new Error(`Arquivo ${arquivo} não encontrado`);
            }
            
            dadosQuestoes = await res.json();
            
            if (!dadosQuestoes || dadosQuestoes.length === 0) {
                throw new Error('Arquivo de questões vazio');
            }
            
            indiceAtual = 0;
            
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-simulado').classList.remove('hidden');
            mostrarQuestao();
        } catch (error) {
            console.error('Erro ao iniciar simulado:', error);
            alert(`Erro ao carregar questões: ${error.message}`);
        }
    }

    // Exibe a questão baseada no índice atual
    function mostrarQuestao() {
        const q = dadosQuestoes[indiceAtual];
        const container = document.getElementById('questao-atual');
        const total = dadosQuestoes.length;

        // Atualiza Progresso
        document.getElementById('num-atual').innerText = indiceAtual + 1;
        document.getElementById('total-questoes').innerText = total;
        document.getElementById('barra-progresso').style.width = ((indiceAtual + 1) / total * 100) + "%";

        // Determina o tipo de questão
        const tipo = q.tipo || 'multipla_escolha';
        const tipoLabel = tipo === 'verdadeiro_falso' ? 'Verdadeiro/Falso' : 
                          tipo === 'relacionar' ? 'Relacionar' : 
                          'Múltipla Escolha';

        // Renderiza Questão
        let htmlOpcoes = '';
        let htmlComentario = '';

        if (tipo === 'verdadeiro_falso') {
            htmlOpcoes = q.opcoes.map((opt, i) => `
                <label class="opcao-item" onclick="selecionarOpcao(this, ${i})">
                    <input type="radio" name="resposta" value="${opt}"> ${opt}
                </label>
            `).join('');
        } else if (tipo === 'relacionar') {
            // Para questões de relacionar, exibe duas colunas
            htmlOpcoes = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:10px 0;">
                    <div>
                        <strong>Coluna A</strong>
                        ${q.coluna_a.map((item, i) => `<div style="padding:8px; border-bottom:1px solid #eee;">${i+1}. ${item}</div>`).join('')}
                    </div>
                    <div>
                        <strong>Coluna B</strong>
                        ${q.coluna_b.map((item, i) => `<div style="padding:8px; border-bottom:1px solid #eee;">${String.fromCharCode(65+i)}. ${item}</div>`).join('')}
                    </div>
                </div>
                <div style="margin-top:10px;">
                    <label style="display:block; padding:12px; border:1px solid #ddd; border-radius:6px;">
                        <span>Resposta (ex: 1A, 2B, 3C, 4D):</span>
                        <input type="text" id="resposta-relacionar" placeholder="Digite sua resposta" style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:4px;">
                    </label>
                </div>
            `;
        } else {
            // Múltipla escolha padrão
            htmlOpcoes = q.opcoes.map((opt, i) => `
                <label class="opcao-item" onclick="selecionarOpcao(this, ${i})">
                    <input type="radio" name="resposta" value="${String.fromCharCode(65 + i)}"> ${opt}
                </label>
            `).join('');
        }

        // Comentário/gabarito
        let gabaritoText = q.correta;
        if (tipo === 'relacionar') {
            gabaritoText = q.correta;
        }

        htmlComentario = `
            <strong>Gabarito: ${gabaritoText}</strong><br>
            ${q.comentario || 'Sem comentário disponível.'}
        `;

        container.innerHTML = `
            <div class="info-questao">
                <span class="tag-artigo">📖 ${q.artigo || 'Geral'}</span>
                <span class="tipo-badge">${tipoLabel}</span>
                <span style="margin-left:10px; color:#999;">ID: ${q.id || '--'}</span>
            </div>
            <h3>${q.pergunta}</h3>
            <div id="opcoes">${htmlOpcoes}</div>
            <div id="feedback" class="comentario">
                ${htmlComentario}
            </div>
        `;

        // Esconde o comentário ao trocar de questão
        document.getElementById('feedback').style.display = 'none';

        // Ajusta botões
        document.getElementById('btn-anterior').disabled = (indiceAtual === 0);
        document.getElementById('btn-proxima').innerText = (indiceAtual === total - 1) ? "Finalizar" : "Próxima →";
    }

    function selecionarOpcao(element, index) {
        // Remove seleção de todos os itens
        const parent = element.closest('#opcoes');
        if (parent) {
            parent.querySelectorAll('.opcao-item').forEach(el => el.classList.remove('selecionada'));
        }
        element.classList.add('selecionada');
        
        // Marca o radio
        const radio = element.querySelector('input[type="radio"]');
        if (radio) radio.checked = true;
    }

    function mudarQuestao(direcao) {
        const novoIndice = indiceAtual + direcao;
        if (novoIndice >= 0 && novoIndice < dadosQuestoes.length) {
            indiceAtual = novoIndice;
            mostrarQuestao();
        } else if (novoIndice >= dadosQuestoes.length) {
            // Verifica se todas as questões foram respondidas
            alert("✅ Simulado concluído!");
            irParaMenu();
        }
    }

    function toggleComentario() {
        const f = document.getElementById('feedback');
        if (f) {
            f.style.display = (f.style.display === 'block') ? 'none' : 'block';
        }
    }

    function irParaMenu() {
        document.getElementById('view-simulado').classList.add('hidden');
        document.getElementById('view-menu').classList.remove('hidden');
    }

    // Inicia o carregamento
    window.onload = carregarMenu;
</script>
</body>
</html>
